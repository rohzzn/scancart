<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScanCart — Settings</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="settings-shell">

      <header class="settings-header">
        <h1>Settings</h1>
        <p class="settings-hint">Keys are stored locally in Chrome.</p>
      </header>

      <section class="settings-card">
        <h2>API keys</h2>
        <label class="field">
          <span>Gemini API key</span>
          <input id="gemini-api-key" type="password" placeholder="Paste your Gemini API key">
        </label>
        <label class="field">
          <span>Gemini model</span>
          <input id="gemini-model" type="text" value="gemini-2.0-flash">
        </label>
        <label class="field">
          <span>USDA FoodData Central key</span>
          <input id="usda-api-key" type="password" placeholder="Paste your USDA key">
        </label>
      </section>

      <section class="settings-card">
        <h2>Source URLs</h2>
        <label class="field">
          <span>Open Food Facts</span>
          <input id="open-food-facts-base-url" type="text">
        </label>
        <label class="field">
          <span>Open Beauty Facts</span>
          <input id="open-beauty-facts-base-url" type="text">
        </label>
        <label class="field">
          <span>USDA API</span>
          <input id="usda-api-base-url" type="text">
        </label>
        <label class="field">
          <span>NIH DSLD API</span>
          <input id="nih-dsld-api-base-url" type="text">
        </label>
      </section>

      <section class="settings-card">
        <h2>Preferences</h2>
        <div id="preferences-grid" class="preferences-grid"></div>
      </section>

      <section class="settings-card settings-actions-card">
        <div class="actions-row">
          <button id="save-settings-button" class="button primary">Save</button>
          <button id="clear-history-button" class="button ghost">Clear history</button>
        </div>
        <p id="save-status" class="save-status"></p>
      </section>

    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
