<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScanCart</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <div class="panel-app">

      <header class="panel-topbar">
        <div class="brand-block">
          <h1>ScanCart</h1>
        </div>
        <div class="topbar-actions">
          <button id="refresh-analysis-button" class="button ghost small">Refresh</button>
          <button id="open-settings-button" class="button ghost small">Settings</button>
        </div>
      </header>

      <main id="panel-content" class="panel-content">
        <section class="empty-state">
          <div class="orb"></div>
          <h2>Open a product page</h2>
          <p>Navigate to a supported retailer and ScanCart will analyse it automatically.</p>
        </section>
      </main>

    </div>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
